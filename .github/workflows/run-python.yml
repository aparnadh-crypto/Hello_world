name: Run Python programs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python add_num.py

      - name: Show output
        run: cat output.txt

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
         name: output-file
         path: output.txt
